<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Logo Preview</title>
  <style>
    body { background: #f0f0f0; display: flex; gap: 40px; padding: 40px; font-family: sans-serif; align-items: flex-start; flex-wrap: wrap; }
    .card { background: #fff; padding: 30px; border-radius: 8px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    .card p { font-size: 0.8rem; color: #666; margin-top: 12px; }
    .dark { background: #222; }
    .dark p { color: #aaa; }
  </style>
</head>
<body>

  <!-- Original -->
  <div class="card">
    <svg viewBox="0 0 40 40" width="160" height="160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polyline points="4,20 20,6 36,20" stroke="#7CBEC6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="10" y="20" width="20" height="14" rx="1" stroke="#7CBEC6" stroke-width="2" fill="none"/>
      <path d="M24,28 Q28,22 34,20" stroke="#a8c5a0" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      <circle cx="32" cy="19" r="2" fill="#a8c5a0"/>
    </svg>
    <p>Original</p>
  </div>

  <!-- Updated: pen at base + leaf shifted right + pool ripples -->
  <div class="card">
    <svg viewBox="0 0 40 40" width="160" height="160" fill="none" xmlns="http://www.w3.org/2000/svg">

      <!-- Roofline -->
      <polyline points="4,20 20,6 36,20" stroke="#7CBEC6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- House rectangle -->
      <rect x="10" y="20" width="20" height="14" rx="1" stroke="#7CBEC6" stroke-width="2" fill="none"/>

      <!-- Pool ripple lines inside rectangle -->
      <path d="M12,25 Q14.5,23.5 17,25 Q19.5,26.5 22,25 Q24.5,23.5 27,25"
            stroke="#7CBEC6" stroke-width="1" fill="none" opacity="0.65"/>
      <path d="M12,29 Q14.5,27.5 17,29 Q19.5,30.5 22,29 Q24.5,27.5 27,29"
            stroke="#7CBEC6" stroke-width="1" fill="none" opacity="0.65"/>

      <!-- Drafting pen — shifted right 2 units (5% of 40) -->
      <rect x="1.5" y="1.5" width="3" height="10" rx="0.8"
            fill="#a8c5a0" transform="translate(4,0) rotate(-38, 8, 8)"/>
      <polygon points="2.2,13.5 5.0,13.5 3.6,17"
               fill="#a8c5a0" transform="translate(4,0) rotate(-38, 8, 8)"/>
      <line x1="3.3" y1="1.5" x2="3.3" y2="9"
            stroke="#fff" stroke-width="0.5" opacity="0.6"
            transform="translate(4,0) rotate(-38, 8, 8)"/>

      <!-- Leaf — top right, mirrored symmetry to pen -->
      <g transform="rotate(38, 32, 8)">
        <path d="M32,2 Q36,8 32,14 Q28,8 32,2 Z"
              stroke="#a8c5a0" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
        <line x1="32" y1="2" x2="32" y2="14"
              stroke="#a8c5a0" stroke-width="0.6" opacity="0.6"/>
      </g>

    </svg>
    <p>Pen (top left) · Leaf (top right) · Pool ripples</p>
  </div>

  <!-- On dark background -->
  <div class="card dark">
    <svg viewBox="0 0 40 40" width="160" height="160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polyline points="4,20 20,6 36,20" stroke="#7CBEC6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="10" y="20" width="20" height="14" rx="1" stroke="#7CBEC6" stroke-width="2" fill="none"/>
      <path d="M12,25 Q14.5,23.5 17,25 Q19.5,26.5 22,25 Q24.5,23.5 27,25"
            stroke="#7CBEC6" stroke-width="1" fill="none" opacity="0.65"/>
      <path d="M12,29 Q14.5,27.5 17,29 Q19.5,30.5 22,29 Q24.5,27.5 27,29"
            stroke="#7CBEC6" stroke-width="1" fill="none" opacity="0.65"/>
      <rect x="1.5" y="1.5" width="3" height="10" rx="0.8"
            fill="#a8c5a0" transform="translate(4,0) rotate(-38, 8, 8)"/>
      <polygon points="2.2,13.5 5.0,13.5 3.6,17"
               fill="#a8c5a0" transform="translate(4,0) rotate(-38, 8, 8)"/>
      <line x1="3.3" y1="1.5" x2="3.3" y2="9"
            stroke="#fff" stroke-width="0.5" opacity="0.6"
            transform="translate(4,0) rotate(-38, 8, 8)"/>
      <!-- Leaf — top right, mirrored symmetry to pen -->
      <g transform="rotate(38, 32, 8)">
        <path d="M32,2 Q36,8 32,14 Q28,8 32,2 Z"
              stroke="#a8c5a0" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
        <line x1="32" y1="2" x2="32" y2="14"
              stroke="#a8c5a0" stroke-width="0.6" opacity="0.6"/>
      </g>
    </svg>
    <p>On dark background</p>
  </div>

</body>
</html>
